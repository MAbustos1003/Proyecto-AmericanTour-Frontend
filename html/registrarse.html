<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="registrarseestile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Tour - Registrarse</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="registration-page">

    <div class="watermark-overlay">
        <img src="./imagenes/logo.png" alt="Marca de agua American Tour S.A.S.">
    </div>

    <div class="submit-container">
        <button type="submit" class="submit-button">
        <img src="./imagenes/circulo-de-flecha.png" alt="Enviar registro">
    </div>

   

    <main class="main-container">
        <h1 class="page-title">Registrarse</h1>

        <form class="registration-form" action="#" method="post">
            
            <div class="input-group">
                <input type="text" id="nombres" name="nombres" placeholder="Nombres" required>
            </div>

            <div class="input-group">
                <input type="text" id="apellidos" name="apellidos" placeholder="Apellidos" required>
            </div>

            <div class="input-group">
                <input type="tel" id="celular" name="celular" placeholder="Celular" pattern="[0-9]{10}" required>
            </div>

            <div class="input-group">
                <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required>
            </div>

            <div class="logo-text-container">
                <p class="brand-name">AMERICAN TOUR&reg;</p>
            </div>

            <div class="submit-container" onclick="location.href='inicio.html'">
                <button type="submit" class="submit-button">
                    <img src="./imagenes/circulo-de-flecha_1.ico" alt="Enviar registro">
                </button>
            </div>
        </form>
    </main>

    <footer class="page-footer">
        <p>American Tour S.A.S Todos los derechos reservados</p>
    </footer>

</body>
</html>
